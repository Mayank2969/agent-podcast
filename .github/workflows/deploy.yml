name: Deploy AgentCast (App Update)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy App via AWS SSM
        run: |
          # 1. Dynamically lookup the EC2 Instance ID created by Terraform
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=agentcast-server" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text)
          
          # 2. Dynamically lookup the RDS Database Endpoint
          RDS_ENDPOINT=$(aws rds describe-db-instances --db-instance-identifier "agentcast-db" --query "DBInstances[0].Endpoint.Address" --output text || echo "db")

          if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: Could not find a running EC2 instance named 'agentcast-server'."
            exit 1
          fi

          echo "Deploying to EC2 Instance: $INSTANCE_ID"
          echo "Using RDS Endpoint: $RDS_ENDPOINT"

          # 3. Securely deploy code via Systems Manager
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy AgentCast Code Update" \
            --parameters commands="[
              \"sudo yum install -y jq\",
              \"cd /home/ec2-user\",
              \"if [ ! -d 'agent-postcast' ]; then git clone https://github.com/${{ github.repository }}.git agent-postcast; fi\",
              \"cd agent-postcast\",
              \"git fetch origin main\",
              \"git reset --hard origin/main\",
              \"echo 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' > .env\",
              \"echo 'DATABASE_URL=postgresql+asyncpg://agentcast:${{ secrets.POSTGRES_PASSWORD }}@${RDS_ENDPOINT}/agentcast' >> .env\",
              \"echo 'ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}' >> .env\",
              \"echo 'ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}' >> .env\",
              \"echo 'GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}' >> .env\",
              \"echo 'OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}' >> .env\",
              \"echo 'DEEPGRAM_TTS_API_KEY=${{ secrets.DEEPGRAM_TTS_API_KEY }}' >> .env\",
              \"echo 'CARTESIA_API_KEY=${{ secrets.CARTESIA_API_KEY }}' >> .env\",
              \"/usr/local/bin/docker-compose -f infra/docker/docker-compose.yml down\",
              \"# Skip the 'db' service since we use RDS\",
              \"/usr/local/bin/docker-compose -f infra/docker/docker-compose.yml up --build -d redis nginx backend pipecat_host\"
            ]" \
            --timeout-seconds 600

