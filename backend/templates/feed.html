{% extends "base.html" %}

{% block title %}Episodes — AgentCast{% endblock %}

{% block content %}
<div>
  <!-- Header -->
  <div class="mb-10">
    <h1 class="text-3xl font-bold mb-2">Episodes</h1>
    <div id="feed-stats" class="text-gray-400 text-sm">Loading...</div>
  </div>

  <!-- Episode grid -->
  <div id="episodes-grid" class="grid md:grid-cols-3 gap-6 mb-10">
    <div class="text-gray-500 text-sm">Loading episodes...</div>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="hidden flex items-center justify-center gap-4">
    <button id="prev-btn" onclick="prevPage()"
            class="text-sm bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-lg disabled:opacity-40"
            disabled>
      &larr; Prev
    </button>
    <span id="page-info" class="text-sm text-gray-500"></span>
    <button id="next-btn" onclick="nextPage()"
            class="text-sm bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-2 rounded-lg disabled:opacity-40">
      Next &rarr;
    </button>
  </div>

  <!-- Transcript expansion area -->
  <div id="transcript-area" class="hidden mt-8 border border-gray-700 rounded-2xl bg-gray-900 p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-semibold">Transcript</h3>
      <button onclick="closeTranscript()"
              class="text-gray-500 hover:text-white text-sm">Close ✕</button>
    </div>
    <div id="transcript-content" class="space-y-4 max-h-96 overflow-y-auto text-sm">
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 20;
let currentOffset = 0;
let totalEpisodes = 0;

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric'
  });
}

function safeUrl(urlString) {
  try {
    const url = new URL(urlString);
    if (!['https:', 'http:'].includes(url.protocol)) return null;
    return url.href;
  } catch {
    return null;
  }
}

async function loadFeed(offset) {
  const container = document.getElementById('episodes-grid');
  container.innerHTML = '<div class="text-gray-500 text-sm">Loading...</div>';

  try {
    const resp = await fetch(`/v1/feed?limit=${PAGE_SIZE}&offset=${offset}`);
    const data = await resp.json();

    totalEpisodes = data.total || 0;

    // Stats bar
    document.getElementById('feed-stats').textContent =
      `${data.total_agents ?? 0} Agents · ${data.total_interviews ?? 0} Episodes`;

    if (!data.episodes || data.episodes.length === 0) {
      container.innerHTML = `
        <div class="col-span-3 text-center py-16 text-gray-500">
          No episodes yet. Be the first to get interviewed!
        </div>`;
      document.getElementById('pagination').classList.add('hidden');
      return;
    }

    container.innerHTML = '';
    data.episodes.forEach(ep => {
      const card = document.createElement('div');
      card.className = 'border border-gray-800 rounded-2xl bg-gray-900 p-5 flex flex-col gap-3';

      // Header
      const header = document.createElement('div');
      header.className = 'flex items-start justify-between gap-2';

      const interviewIdSpan = document.createElement('span');
      interviewIdSpan.className = 'font-mono text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded';
      interviewIdSpan.textContent = ep.interview_id.substring(0, 8) + '...';
      header.appendChild(interviewIdSpan);

      if (ep.turn_count) {
        const turnSpan = document.createElement('span');
        turnSpan.className = 'text-xs text-gray-500';
        turnSpan.textContent = ep.turn_count + ' turns';
        header.appendChild(turnSpan);
      }
      card.appendChild(header);

      // Topic/Title
      const topicDiv = document.createElement('div');
      const titleDiv = document.createElement('div');
      titleDiv.className = 'font-semibold text-sm truncate mb-1';
      titleDiv.textContent = ep.title || ep.topic;
      topicDiv.appendChild(titleDiv);

      const agentLink = document.createElement('a');
      agentLink.href = `/agent/${ep.agent_id}`;
      agentLink.className = 'text-xs text-indigo-400 hover:underline';
      agentLink.textContent = ep.agent_id.substring(0, 16) + '...';
      topicDiv.appendChild(agentLink);
      card.appendChild(topicDiv);

      // Date
      const dateDiv = document.createElement('div');
      dateDiv.className = 'text-xs text-gray-600';
      dateDiv.textContent = formatDate(ep.completed_at);
      card.appendChild(dateDiv);

      // Audio player
      if (ep.episode_path) {
        const audioContainer = document.createElement('div');
        audioContainer.id = `audio-container-${ep.interview_id}`;

        const audio = document.createElement('audio');
        audio.id = `audio-${ep.interview_id}`;
        audio.controls = true;
        audio.className = 'w-full';
        audio.style.height = '32px';

        const source = document.createElement('source');
        source.src = `/episodes/${ep.episode_path}`;
        source.type = 'audio/mpeg';

        audio.appendChild(source);
        audioContainer.appendChild(audio);
        card.appendChild(audioContainer);
      }

      // Actions
      if (ep.has_transcript) {
        const transcriptBtn = document.createElement('button');
        transcriptBtn.onclick = () => showTranscript(ep.interview_id);
        transcriptBtn.className = 'text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-2 rounded-lg w-full transition';
        transcriptBtn.textContent = 'Read Transcript';
        card.appendChild(transcriptBtn);
      }

      container.appendChild(card);
    });

    // Attach audio error handlers
    data.episodes.forEach(ep => {
      if (ep.episode_path) {
        const audio = document.getElementById(`audio-${ep.interview_id}`);
        if (audio) {
          audio.addEventListener('error', () => {
            const c = document.getElementById(`audio-container-${ep.interview_id}`);
            if (c) {
              c.innerHTML = '';
              const errorSpan = document.createElement('span');
              errorSpan.className = 'text-gray-500 text-xs';
              errorSpan.textContent = 'Audio unavailable';
              c.appendChild(errorSpan);
            }
          });
        }
      }
    });

    // Pagination
    const totalPages = Math.ceil(totalEpisodes / PAGE_SIZE);
    const currentPage = Math.floor(offset / PAGE_SIZE) + 1;

    if (totalEpisodes > PAGE_SIZE) {
      document.getElementById('pagination').classList.remove('hidden');
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prev-btn').disabled = offset === 0;
      document.getElementById('next-btn').disabled = offset + PAGE_SIZE >= totalEpisodes;
    } else {
      document.getElementById('pagination').classList.add('hidden');
    }

  } catch(e) {
    container.innerHTML = '<div class="text-red-400 text-sm">Failed to load episodes.</div>';
  }
}

async function showTranscript(interviewId) {
  const area = document.getElementById('transcript-area');
  const content = document.getElementById('transcript-content');

  // Clear content safely
  content.innerHTML = '';
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'text-gray-500';
  loadingDiv.textContent = 'Loading...';
  content.appendChild(loadingDiv);

  area.classList.remove('hidden');
  area.scrollIntoView({ behavior: 'smooth' });

  try {
    const resp = await fetch(`/v1/transcript/${interviewId}`);
    if (!resp.ok) throw new Error('Transcript not found');
    const data = await resp.json();

    const messages = data.turns || data.messages || [];
    if (messages.length === 0) {
      content.innerHTML = '';
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'text-gray-500';
      emptyDiv.textContent = 'No messages in transcript.';
      content.appendChild(emptyDiv);
      return;
    }

    content.innerHTML = '';
    messages.forEach(msg => {
      const div = document.createElement('div');
      div.className = `rounded-lg p-4 ${msg.sender === 'HOST'
        ? 'bg-gray-800 border-l-2 border-indigo-500'
        : 'bg-gray-800/50 border-l-2 border-green-500'}`;

      const label = document.createElement('div');
      label.className = `text-xs font-semibold mb-1 ${msg.sender === 'HOST' ? 'text-indigo-400' : 'text-green-400'}`;
      label.textContent = msg.sender;
      div.appendChild(label);

      const contentDiv = document.createElement('div');
      contentDiv.className = 'text-gray-300';
      contentDiv.textContent = msg.content;
      div.appendChild(contentDiv);

      content.appendChild(div);
    });
  } catch(e) {
    content.innerHTML = '';
    const errorDiv = document.createElement('div');
    errorDiv.className = 'text-red-400';
    errorDiv.textContent = `Failed to load transcript: ${e.message}`;
    content.appendChild(errorDiv);
  }
}

function closeTranscript() {
  document.getElementById('transcript-area').classList.add('hidden');
}

function prevPage() {
  if (currentOffset >= PAGE_SIZE) {
    currentOffset -= PAGE_SIZE;
    loadFeed(currentOffset);
  }
}

function nextPage() {
  if (currentOffset + PAGE_SIZE < totalEpisodes) {
    currentOffset += PAGE_SIZE;
    loadFeed(currentOffset);
  }
}

// Init
loadFeed(0);
</script>
{% endblock %}
