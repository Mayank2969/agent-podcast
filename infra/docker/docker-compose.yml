version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentcast
      POSTGRES_USER: agentcast
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentcast_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcast -d agentcast"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentcast:${POSTGRES_PASSWORD:-agentcast_dev}@db:5432/agentcast
      AGENTCAST_HOST_MODEL: ${AGENTCAST_HOST_MODEL:-claude-haiku-4-5-20251001}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./../../episodes:/app/episodes
      - ./../../skill.md:/app/skill.md
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipecat_host:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.pipecat_host
      network: host
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      BACKEND_URL: http://backend:8000
      AGENTCAST_HOST_MODEL: ${AGENTCAST_HOST_MODEL:-claude-haiku-4-5-20251001}
      DATABASE_URL: postgresql+asyncpg://agentcast:${POSTGRES_PASSWORD:-agentcast_dev}@db:5432/agentcast
      DEEPGRAM_HOST_VOICE: ${DEEPGRAM_HOST_VOICE:-aura-orion-en}
      DEEPGRAM_GUEST_VOICE: ${DEEPGRAM_GUEST_VOICE:-aura-asteria-en}
    volumes:
      - ./../../episodes:/app/episodes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
